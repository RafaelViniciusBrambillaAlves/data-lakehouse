services:
  # =========================
  # POSTGRES (DATA SOURCE)
  # =========================
  postgres-source:
    image: postgres:15
    container_name: postgres-lakehouse
    restart: always
    environment:
      POSTGRES_DB: lakehouse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./data/source/postgres/init.sql:/docker-entrypoint-initdb.d/1_init.sql
      - ./data/source/postgres/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
      - ./data/source/postgres/csv:/data/csv
      # Inicializa Hive Metastore 
      - ./storage/hive/init_metastore.sql:/docker-entrypoint-initdb.d/3_hive_metastore.sql
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lakehouse"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse-network

  # =========================
  # MINIO (OBJECT STORAGE)
  # =========================
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SITE_NAME: lakehouse
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web UI
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - lakehouse-network

  # =========================
  # MINIO CLIENT (SETUP)
  # Cria os buckets bronze/silver/gold automaticamente
  # =========================
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      mc mb --ignore-existing local/lakehouse;
      mc mb --ignore-existing local/raw;
      mc mb --ignore-existing local/checkpoints;
      mc anonymous set none local/bronze;
      mc anonymous set none local/silver;
      mc anonymous set none local/gold;
      echo 'Buckets criados com sucesso.';
      "
    networks:
      - lakehouse-network

  # =========================
  # HIVE METASTORE
  # =========================
  hive-metastore:
    build:
      context: .
      dockerfile: infra/docker/hive/Dockerfile
    container_name: hive-metastore
    restart: always
    depends_on:
      postgres-source:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      # Backend: PostgreSQL
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-lakehouse:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=admin
        -Djavax.jdo.option.ConnectionPassword=admin
      # S3/MinIO como storage
      FS_S3A_ENDPOINT: http://minio:9000
      FS_S3A_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      FS_S3A_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FS_S3A_PATH_STYLE_ACCESS: "true"
      FS_S3A_IMPL: org.apache.hadoop.fs.s3a.S3AFileSystem
      HIVE_METASTORE_WAREHOUSE_DIR: s3a://gold/warehouse
    ports:
      - "9083:9083"
    volumes:
      - ./storage/hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - lakehouse-network

   # =========================
  # SPARK
  # =========================
  spark:
    build:
      context: .
      dockerfile: infra/docker/spark/Dockerfile
    container_name: spark
    depends_on:
      postgres-source:
        condition: service_healthy
      minio:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      PYTHONPATH: /opt/spark/app
      SPARK_DRIVER_MEMORY: 2G
      SPARK_EXECUTOR_MEMORY: 2G
    volumes:
      - ./processing:/opt/spark/app/processing
      - ./ingestion:/opt/spark/app/ingestion
      - ./config:/opt/spark/app/config
      - ./utils:/opt/spark/app/utils
      - ./data:/data
      - ./.env:/opt/spark/app/.env 
    command: tail -f /dev/null
    networks:
      - lakehouse-network
  
volumes:
  minio-data:
    driver: local

networks:
  lakehouse-network:
    driver: bridge